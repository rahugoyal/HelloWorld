plugins {
    id "com.android.application"
    id "org.sonarqube"

}

android {
    namespace "com.example.hellocicd"
    compileSdk 36

    defaultConfig {
        applicationId "com.example.hellocicd"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0.0"
    }
}
sonar {
    properties {
        property "sonar.projectKey", "HelloCICD"
        property "sonar.projectName", "HelloCICD"
        property "sonar.host.url", "http://localhost:9000"
        property "sonar.sources", "src/main/java"
        property "sonar.java.binaries", "build/intermediates/javac/debug/classes"
    }
}
tasks.register("printVersionName") {
    doLast {
        println android.defaultConfig.versionName
    }
}
